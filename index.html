    <!-- PWA manifest（Android / 現代瀏覽器） -->
    <link id="app-manifest" rel="manifest" href="/toilet-pwa-app/manifest.json" />
    <script>
      (() => {
        const raw = (navigator.languages && navigator.languages[0]) || navigator.language || "en";
        const base = raw.trim().toLowerCase().split("-")[0];
        const currentDeviceLang = base === "zh" ? "zh-TW" : (base === "ja" ? "ja" : (base === "ko" ? "ko" : "en"));
        let locale = currentDeviceLang;
        try {
          const lastDeviceLang = localStorage.getItem("lastDeviceLang");
          const lastManualLang = localStorage.getItem("lastManualLang");
          if (currentDeviceLang === lastDeviceLang && ["zh-TW", "en", "ja", "ko"].includes(lastManualLang)) locale = lastManualLang;
          if (currentDeviceLang !== lastDeviceLang) localStorage.removeItem("lastManualLang");
          localStorage.setItem("lastDeviceLang", currentDeviceLang);
        } catch (_) { /* storage 不可用時跟隨裝置語系 */ }
        window.__APP_BOOT_LOCALE__ = locale;
        document.documentElement.lang = locale;
        document.getElementById("app-manifest").setAttribute("href", locale === "zh-TW" ? "manifest.json" : `manifest-${locale}.json`);
      })();
    </script>

      #app-loading .al-dots span {

      #app-loading .al-dots span:nth-child(2) { animation-delay: 0.2s; }

      @keyframes al-pulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.75); }
        40% { opacity: 1; transform: scale(1); }
      }
    </style>
