<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>目前沒有網路連線 — 廁所咧</title>
  <style>
    /* 離線 fallback：自給自足、不依賴任何外部 JS/CSS/字型。粉紫溫暖風（MuXi Labs / 阿便）。 */
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      min-height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 24px calc(20px + env(safe-area-inset-right, 0px)) calc(24px + env(safe-area-inset-bottom, 0px)) calc(20px + env(safe-area-inset-left, 0px));
      background: linear-gradient(160deg, #fdeef6 0%, #f3e8fb 100%);
      color: #6b3a5b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%; max-width: 360px; text-align: center;
      background: rgba(255, 255, 255, 0.72);
      border: 1.5px solid #f6c8e2;
      border-radius: 22px;
      padding: 28px 22px 24px;
      box-shadow: 0 10px 30px rgba(233, 30, 140, 0.12);
    }
    .mascot {
      width: 132px; height: 132px; margin: 0 auto 4px;
      border-radius: 50%; object-fit: cover; display: block;
      background: #f3e8fb;
    }
    /* 圖片載入失敗時的純文字 emoji 後備 */
    .mascot-fallback { font-size: 84px; line-height: 1.2; margin: 4px 0 0; }
    h1 { font-size: 21px; margin: 14px 0 6px; color: #e91e8c; font-weight: 800; }
    p { font-size: 14px; line-height: 1.6; margin: 6px 0; color: #7a5269; }
    .hint { font-size: 12.5px; color: #a47e96; margin-top: 10px; }
    .actions { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    button {
      font: inherit; font-weight: 700; font-size: 15px;
      border-radius: 999px; padding: 12px 18px; cursor: pointer; border: none;
    }
    .primary {
      color: #fff;
      background: linear-gradient(135deg, #fbb6ce, #f687b3);
      box-shadow: 0 4px 12px rgba(246, 135, 179, 0.4);
    }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <main class="card">
    <!-- 阿便（icon-512）；SW 已 precache，離線可顯示。載入失敗 → onerror 切純文字後備，永不空白。 -->
    <img class="mascot" src="./icons/icon-512.png" alt="阿便"
         onerror="this.style.display='none';document.getElementById('mascot-fb').style.display='block';" />
    <div id="mascot-fb" class="mascot-fallback" style="display:none">🚽</div>
    <h1>目前沒有網路連線</h1>
    <p>請重新連線後再試一次</p>
    <p class="hint">地下室或訊號不佳時，地圖與最新資料可能無法載入</p>
    <div class="actions">
      <button class="primary" type="button" onclick="location.reload()">重新整理</button>
    </div>
  </main>
</body>
</html>
